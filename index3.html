<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>우리 동네 불편 신고소</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Leaflet CSS (Map) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        #map { z-index: 10; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gray-100 flex justify-center min-h-screen">

    <!-- App Container (Mobile Mockup Width) -->
    <div class="w-full max-w-md bg-white min-h-screen shadow-2xl relative overflow-hidden flex flex-col">
        
        <!-- ========================================== -->
        <!-- SCREEN 1: Language Selection (First Screen)-->
        <!-- ========================================== -->
        <div id="screen-language" class="absolute inset-0 bg-white z-50 flex flex-col p-6 fade-in">
            <div class="flex-1 flex flex-col justify-center items-center mt-10">
                <i data-lucide="globe-2" class="w-16 h-16 text-indigo-600 mb-6"></i>
                <h1 class="text-2xl font-bold text-gray-800 mb-2 text-center">우리 동네 불편 신고소</h1>
                <p class="text-gray-500 mb-8 text-center">Please select your language</p>
                
                <div class="grid grid-cols-2 gap-3 w-full max-w-sm">
                    <!-- Languages -->
                    <button onclick="selectLanguage('ko')" class="lang-btn py-3 px-4 rounded-xl border border-indigo-200 bg-indigo-50 text-indigo-700 hover:border-indigo-600 transition text-center font-bold">한국어</button>
                    <button onclick="selectLanguage('en')" class="lang-btn py-3 px-4 rounded-xl border border-gray-200 hover:border-indigo-600 hover:bg-indigo-50 transition text-center font-medium">English</button>
                    <button onclick="selectLanguage('zh')" class="lang-btn py-3 px-4 rounded-xl border border-gray-200 hover:border-indigo-600 hover:bg-indigo-50 transition text-center font-medium">中文</button>
                    <button onclick="selectLanguage('ja')" class="lang-btn py-3 px-4 rounded-xl border border-gray-200 hover:border-indigo-600 hover:bg-indigo-50 transition text-center font-medium">日本語</button>
                    <button onclick="selectLanguage('vi')" class="lang-btn py-3 px-4 rounded-xl border border-gray-200 hover:border-indigo-600 hover:bg-indigo-50 transition text-center font-medium">Tiếng Việt</button>
                    <button onclick="selectLanguage('th')" class="lang-btn py-3 px-4 rounded-xl border border-gray-200 hover:border-indigo-600 hover:bg-indigo-50 transition text-center font-medium">ภาษาไทย</button>
                    <button onclick="selectLanguage('ru')" class="lang-btn py-3 px-4 rounded-xl border border-gray-200 hover:border-indigo-600 hover:bg-indigo-50 transition text-center font-medium">Русский</button>
                    <button onclick="selectLanguage('tl')" class="lang-btn py-3 px-4 rounded-xl border border-gray-200 hover:border-indigo-600 hover:bg-indigo-50 transition text-center font-medium">Tagalog</button>
                    <button onclick="selectLanguage('mn')" class="lang-btn py-3 px-4 rounded-xl border border-gray-200 hover:border-indigo-600 hover:bg-indigo-50 transition text-center font-medium">Монгол</button>
                    <button onclick="selectLanguage('id')" class="lang-btn py-3 px-4 rounded-xl border border-gray-200 hover:border-indigo-600 hover:bg-indigo-50 transition text-center font-medium">Indonesia</button>
                    <button onclick="selectLanguage('uz')" class="lang-btn py-3 px-4 rounded-xl border border-gray-200 hover:border-indigo-600 hover:bg-indigo-50 transition text-center font-medium">Oʻzbekcha</button>
                </div>
            </div>
            <div class="text-center text-xs text-gray-400 mt-auto">
                <p>Supported by Local Government</p>
            </div>
        </div>

        <!-- ========================================== -->
        <!-- SCREEN 2: Main Dashboard                   -->
        <!-- ========================================== -->
        <div id="screen-main" class="hidden flex-col h-full fade-in relative">
            <!-- Header -->
            <header class="bg-white px-5 py-4 border-b border-gray-100 flex justify-between items-center sticky top-0 z-30">
                <div class="flex items-center gap-2">
                    <div class="bg-indigo-100 p-2 rounded-lg text-indigo-600">
                        <i data-lucide="map-pin" class="w-5 h-5"></i>
                    </div>
                    <h1 id="ui-app-title" class="font-bold text-gray-800 text-lg">Local Reports</h1>
                </div>
                <button onclick="showLanguageScreen()" class="text-gray-400 hover:text-indigo-600">
                    <i data-lucide="globe" class="w-5 h-5"></i>
                </button>
            </header>

            <!-- Map Section -->
            <div class="h-64 bg-gray-200 relative w-full z-10" id="map">
                <!-- Map will load here -->
            </div>

            <!-- Content Section -->
            <main class="flex-1 bg-gray-50 p-5 rounded-t-3xl -mt-6 z-20 relative overflow-y-auto hide-scrollbar pb-24">
                
                <!-- NEW Bigger Banner for Rules -->
                <div class="mb-6 bg-gradient-to-r from-indigo-500 to-purple-600 rounded-2xl p-4 text-white shadow-md cursor-pointer hover:shadow-lg transition transform hover:-translate-y-1" onclick="showRulesScreen()">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <div class="bg-white/20 p-2.5 rounded-xl backdrop-blur-sm">
                                <i data-lucide="book-open" class="w-6 h-6 text-white"></i>
                            </div>
                            <div>
                                <h3 id="ui-banner-rules-title" class="font-bold text-base">Local Rules</h3>
                                <p id="ui-banner-rules-desc" class="text-xs text-indigo-100 mt-0.5">Tap to see community guidelines</p>
                            </div>
                        </div>
                        <i data-lucide="chevron-right" class="w-5 h-5 text-white/70"></i>
                    </div>
                </div>

                <div class="flex justify-between items-end mb-4">
                    <h2 id="ui-recent-reports" class="font-bold text-gray-800 text-lg">Recent Reports</h2>
                </div>

                <!-- Report List Container -->
                <div id="report-list" class="space-y-4">
                    <!-- Cards will be injected via JS -->
                </div>

            </main>

            <!-- Floating Action Button -->
            <button onclick="showSubmitScreen()" class="absolute bottom-6 right-6 bg-indigo-600 text-white p-4 rounded-full shadow-lg shadow-indigo-200 hover:bg-indigo-700 hover:scale-105 transition-transform z-30 flex items-center justify-center">
                <i data-lucide="plus" class="w-6 h-6"></i>
            </button>
        </div>

        <!-- ========================================== -->
        <!-- SCREEN 3: Submit Report Form               -->
        <!-- ========================================== -->
        <div id="screen-submit" class="hidden absolute inset-0 bg-white z-50 flex-col fade-in">
            <!-- Header -->
            <header class="px-5 py-4 border-b border-gray-100 flex justify-between items-center">
                <button onclick="hideSubmitScreen()" class="text-gray-500 hover:text-gray-800">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
                <h1 id="ui-submit-title" class="font-bold text-gray-800 text-lg">New Report</h1>
                <div class="w-6"></div> <!-- Spacer -->
            </header>

            <main class="flex-1 p-5 overflow-y-auto">
                <div class="bg-indigo-50 rounded-xl p-4 mb-6 flex items-start gap-3 text-indigo-800 text-sm">
                    <i data-lucide="info" class="w-5 h-5 shrink-0 mt-0.5"></i>
                    <p id="ui-submit-guide">Please describe the issue clearly. We will process it as soon as possible.</p>
                </div>

                <form id="report-form" class="space-y-5" onsubmit="submitReport(event)">
                    
                    <!-- Location (Auto) -->
                    <div>
                        <label id="ui-label-loc" class="block text-sm font-medium text-gray-700 mb-1">Location</label>
                        <div class="flex items-center bg-gray-100 p-3 rounded-xl text-gray-600 text-sm">
                            <i data-lucide="map-pin" class="w-4 h-4 mr-2 text-indigo-600"></i>
                            <span id="current-location-text">Current Location (Auto-detected)</span>
                        </div>
                    </div>

                    <!-- Category -->
                    <div>
                        <label id="ui-label-cat" class="block text-sm font-medium text-gray-700 mb-1">Category</label>
                        <select id="category" required class="w-full bg-gray-50 border border-gray-200 text-gray-800 text-sm rounded-xl focus:ring-indigo-500 focus:border-indigo-500 block p-3 outline-none">
                            <option value="trash">Trash / Cleaning</option>
                            <option value="road">Road / Facility Damage</option>
                            <option value="light">Streetlight Broken</option>
                            <option value="noise">Noise Complaint</option>
                            <option value="other">Other</option>
                        </select>
                    </div>

                    <!-- Photo Upload -->
                    <div>
                        <label id="ui-label-photo" class="block text-sm font-medium text-gray-700 mb-1">Photo (Optional)</label>
                        <input type="file" id="photo-upload" accept="image/*" class="hidden" onchange="handlePhotoUpload(event)">
                        <label for="photo-upload" id="photo-preview-container" class="w-full border-2 border-dashed border-gray-300 rounded-xl p-6 flex flex-col items-center justify-center text-gray-400 hover:bg-gray-50 hover:border-indigo-400 cursor-pointer transition relative overflow-hidden h-32">
                            <i data-lucide="camera" class="w-8 h-8 mb-2" id="photo-icon"></i>
                            <span id="ui-photo-btn" class="text-sm">Tap to upload photo</span>
                            <img id="photo-preview" class="hidden absolute inset-0 w-full h-full object-cover">
                        </label>
                        <button type="button" id="remove-photo-btn" class="hidden mt-2 text-xs text-red-500 hover:underline flex items-center" onclick="removePhoto()">
                            <i data-lucide="trash-2" class="w-3 h-3 mr-1"></i> Remove photo
                        </button>
                    </div>

                    <!-- Description -->
                    <div>
                        <label id="ui-label-desc" class="block text-sm font-medium text-gray-700 mb-1">Description</label>
                        <textarea id="description" rows="4" required class="block p-3 w-full text-sm text-gray-800 bg-gray-50 rounded-xl border border-gray-200 focus:ring-indigo-500 focus:border-indigo-500 outline-none" placeholder="Details of the issue..."></textarea>
                    </div>

                    <!-- Submit Btn -->
                    <button type="submit" id="ui-submit-btn" class="w-full text-white bg-indigo-600 hover:bg-indigo-700 focus:ring-4 focus:ring-indigo-300 font-medium rounded-xl text-sm px-5 py-4 text-center transition shadow-lg shadow-indigo-200 mt-4">
                        Submit Report
                    </button>
                </form>
            </main>
        </div>

        <!-- ========================================== -->
        <!-- SCREEN 4: Report Detail (Response View)    -->
        <!-- ========================================== -->
        <div id="screen-detail" class="hidden absolute inset-0 bg-white z-50 flex-col fade-in">
             <header class="px-5 py-4 border-b border-gray-100 flex justify-between items-center bg-white">
                <button onclick="hideDetailScreen()" class="text-gray-500 hover:text-gray-800">
                    <i data-lucide="arrow-left" class="w-6 h-6"></i>
                </button>
                <h1 id="ui-detail-title" class="font-bold text-gray-800 text-lg">Report Detail</h1>
                <div class="w-6"></div>
            </header>
            <main class="flex-1 p-5 overflow-y-auto bg-gray-50" id="detail-content">
                <!-- Detail content injected via JS -->
            </main>
        </div>

        <!-- ========================================== -->
        <!-- SCREEN 5: Local Rules (동네 규칙)          -->
        <!-- ========================================== -->
        <div id="screen-rules" class="hidden absolute inset-0 bg-white z-50 flex-col fade-in">
            <header class="px-5 py-4 border-b border-gray-100 flex justify-between items-center bg-white">
                <button onclick="hideRulesScreen()" class="text-gray-500 hover:text-gray-800">
                    <i data-lucide="arrow-left" class="w-6 h-6"></i>
                </button>
                <h1 id="ui-rules-title" class="font-bold text-gray-800 text-lg">Local Rules</h1>
                <div class="w-6"></div>
            </header>
            <main class="flex-1 p-5 overflow-y-auto bg-gray-50 space-y-4" id="rules-content">
                <!-- Rules injected via JS -->
            </main>
        </div>

    </div>

    <!-- Leaflet Map JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Application Logic -->

            "Pothole on the main crosswalk.": { ko: "메인 횡단보도에 포트홀이 있습니다.", zh: "主干道斑马线上有坑洼。", ja: "メインの横断歩道にポットホールがあります。", vi: "Ổ gà trên lối qua đường chính." },
            "We have dispatched a cleaning team and removed the trash. Thank you.": { ko: "청소팀을 파견하여 쓰레기를 수거했습니다. 감사합니다.", zh: "我们已派出清洁队清理了垃圾。谢谢。", ja: "清掃チームを派遣し、ゴミを撤去しました。ありがとうございます。", vi: "Chúng tôi đã cử đội làm sạch và dọn rác. Cảm ơn." },
            "Maintenance team is scheduled to fix it by tomorrow.": { ko: "내일까지 유지보수 팀이 수리할 예정입니다.", zh: "维修团队计划在明天之前修复它。", ja: "メンテナンスチームが明日までに修理する予定です。", vi: "Đội bảo trì dự kiến sẽ sửa chữa vào ngày mai." }
        };

        function getTranslatedText(text) {
            if (!text) return text;
            if (currentLang !== 'en' && mockTranslations[text] && mockTranslations[text][currentLang]) {
                return mockTranslations[text][currentLang];
            }
            // For languages without specific translations or new user inputs, return original text.
            return text;
        }

        let currentLang = 'en';
        let currentPhotoBase64 = null; // 사진 데이터를 저장할 변수
        
        // --- 2. Mock Data & State ---
        // Default location: Suwon, Korea (As per system instruction context)
        const defaultLat = 37.2636;
        const defaultLng = 127.0286;
        let map, userMarker;
        
        const mockReports = [
            { id: 1, lat: 37.2646, lng: 127.0296, cat: 'trash', status: 'statDone', desc: "Garbage piled up near the bus stop.", date: "2026-07-01", reply: "We have dispatched a cleaning team and removed the trash. Thank you." },
            { id: 2, lat: 37.2620, lng: 127.0270, cat: 'light', status: 'statProg', desc: "The street light in the alley is flickering.", date: "2026-07-02", reply: "Maintenance team is scheduled to fix it by tomorrow." },
            { id: 3, lat: 37.2650, lng: 127.0250, cat: 'road', status: 'statWait', desc: "Pothole on the main crosswalk.", date: "2026-07-03", reply: null }
        ];

        // --- 3. UI Control Functions ---
        function getText(key, fallbackLang = 'en') {
            return (dict[currentLang] && dict[currentLang][key]) || dict[fallbackLang][key] || key;
        }

        function getCategoryText(catKey) {
            return (categories[catKey] && categories[catKey][currentLang]) || categories[catKey]['en'];
        }

        function selectLanguage(langCode) {
            currentLang = langCode;
            updateUIStrings();
            
            // Transition screens
            document.getElementById('screen-language').classList.add('hidden');
            document.getElementById('screen-main').classList.remove('hidden');
            document.getElementById('screen-main').classList.add('flex');
            
            // Initialize Map after DOM is visible
            setTimeout(initMap, 100);
            renderReports();
        }

        function showLanguageScreen() {
            document.getElementById('screen-main').classList.add('hidden');
            document.getElementById('screen-main').classList.remove('flex');
            document.getElementById('screen-language').classList.remove('hidden');
        }

        function updateUIStrings() {
            document.getElementById('ui-app-title').textContent = getText('title');
            document.getElementById('ui-recent-reports').textContent = getText('recent');
            
            const locNameElem = document.getElementById('ui-location-name');
            if (locNameElem) {
                locNameElem.innerHTML = `<i data-lucide="navigation" class="w-3 h-3 mr-1"></i> ${getText('loc')}`;
            }
            
            // Submit form UI
            document.getElementById('ui-submit-title').textContent = getText('subTitle');
            document.getElementById('ui-submit-guide').textContent = getText('subGuide');
            document.getElementById('ui-label-loc').textContent = getText('lLoc');
            document.getElementById('ui-label-cat').textContent = getText('lCat');
            document.getElementById('ui-label-photo').textContent = getText('lPhoto');
            document.getElementById('ui-label-desc').textContent = getText('lDesc');
            document.getElementById('ui-submit-btn').textContent = getText('btnSubmit');
            if (!currentPhotoBase64) {
                document.getElementById('ui-photo-btn').textContent = getText('btnPhoto');
            }
            document.getElementById('ui-detail-title').textContent = getText('detTitle');
            
            // Rules UI & Placeholders
            const bannerRulesTitle = document.getElementById('ui-banner-rules-title');
            if (bannerRulesTitle) bannerRulesTitle.textContent = getText('bannerRulesTitle');
            
            const bannerRulesDesc = document.getElementById('ui-banner-rules-desc');
            if (bannerRulesDesc) bannerRulesDesc.textContent = getText('bannerRulesDesc');
            
            document.getElementById('ui-rules-title').textContent = getText('rulesTitle');

            const curLocText = document.getElementById('current-location-text');
            if (curLocText) curLocText.textContent = getText('curLoc');

            const descInput = document.getElementById('description');
            if (descInput) descInput.placeholder = getText('descPlaceholder');

            // Update category dropdown
            const catSelect = document.getElementById('category');
            catSelect.innerHTML = '';
            for (const [key, value] of Object.entries(categories)) {
                catSelect.innerHTML += `<option value="${key}">${getCategoryText(key)}</option>`;
            }
            
            lucide.createIcons();
        }

        // --- 4. Map Functions ---
        function initMap() {
            if (map) { map.invalidateSize(); return; } // already initialized

            map = L.map('map', { zoomControl: false }).setView([defaultLat, defaultLng], 14);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap',
                maxZoom: 19
            }).addTo(map);

            // Mock User Location
            userMarker = L.circleMarker([defaultLat, defaultLng], {
                radius: 8, fillColor: "#4f46e5", color: "#ffffff", weight: 2, opacity: 1, fillOpacity: 1
            }).addTo(map);

            // Add report markers
            renderMapMarkers();
        }

        function renderMapMarkers() {
            // Clear existing markers (except user) - simplified for demo
            mockReports.forEach(report => {
                let color = report.status === 'statDone' ? '#10b981' : (report.status === 'statProg' ? '#f59e0b' : '#ef4444');
                L.circleMarker([report.lat, report.lng], {
                    radius: 6, fillColor: color, color: "#fff", weight: 2, fillOpacity: 0.8
                }).addTo(map).bindPopup(`<b>${getCategoryText(report.cat)}</b><br>${getText(report.status)}`);
            });
        }

        // --- 5. Report List & Submission ---
        function getStatusBadge(statusKey) {
            const text = getText(statusKey);
            if (statusKey === 'statDone') return `<span class="px-2.5 py-1 bg-green-100 text-green-700 text-xs font-bold rounded-full">${text}</span>`;
            if (statusKey === 'statProg') return `<span class="px-2.5 py-1 bg-yellow-100 text-yellow-700 text-xs font-bold rounded-full">${text}</span>`;
            return `<span class="px-2.5 py-1 bg-red-100 text-red-700 text-xs font-bold rounded-full">${text}</span>`;
        }

        function getCategoryIcon(cat) {
            const map = { trash: 'trash-2', road: 'cone', light: 'lightbulb', noise: 'volume-x', other: 'alert-circle' };
            return map[cat] || 'alert-circle';
        }

        function renderReports() {
            const list = document.getElementById('report-list');
            list.innerHTML = '';
            
            // Sort by ID desc (newest first)
            const sorted = [...mockReports].sort((a,b) => b.id - a.id);

            sorted.forEach(rep => {
                const card = document.createElement('div');
                card.className = "bg-white p-4 rounded-2xl shadow-sm border border-gray-100 cursor-pointer hover:shadow-md transition";
                card.onclick = () => showDetailScreen(rep.id);
                
                // Translate description
                const translatedDesc = getTranslatedText(rep.desc);

                card.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <div class="flex items-center gap-2">
                            <div class="p-2 bg-gray-50 rounded-lg text-gray-600">
                                <i data-lucide="${getCategoryIcon(rep.cat)}" class="w-5 h-5"></i>
                            </div>
                            <div>
                                <h3 class="font-bold text-gray-800 text-sm">${getCategoryText(rep.cat)}</h3>
                                <p class="text-xs text-gray-400">${rep.date}</p>
                            </div>
                        </div>
                        ${getStatusBadge(rep.status)}
                    </div>
                    <p class="text-sm text-gray-600 line-clamp-1 mt-2">${translatedDesc}</p>
                `;
                list.appendChild(card);
            });
            lucide.createIcons();
        }

        function showSubmitScreen() {
            document.getElementById('screen-submit').classList.remove('hidden');
            document.getElementById('screen-submit').classList.add('flex');
            document.getElementById('description').value = ''; // clear
            removePhoto(); // 사진 업로드 상태 초기화
        }

        function hideSubmitScreen() {
            document.getElementById('screen-submit').classList.add('hidden');
            document.getElementById('screen-submit').classList.remove('flex');
        }

        // --- Photo Upload Logic ---
        function handlePhotoUpload(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    currentPhotoBase64 = e.target.result;
                    const preview = document.getElementById('photo-preview');
                    preview.src = currentPhotoBase64;
                    preview.classList.remove('hidden');
                    document.getElementById('photo-icon').classList.add('hidden');
                    document.getElementById('ui-photo-btn').classList.add('hidden');
                    document.getElementById('remove-photo-btn').classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            }
        }

        function removePhoto() {
            currentPhotoBase64 = null;
            document.getElementById('photo-upload').value = '';
            document.getElementById('photo-preview').classList.add('hidden');
            document.getElementById('photo-preview').src = '';
            document.getElementById('photo-icon').classList.remove('hidden');
            document.getElementById('ui-photo-btn').classList.remove('hidden');
            document.getElementById('ui-photo-btn').textContent = getText('btnPhoto');
            document.getElementById('remove-photo-btn').classList.add('hidden');
        }

        function submitReport(e) {
            e.preventDefault();
            const cat = document.getElementById('category').value;
            const desc = document.getElementById('description').value;
            
            // Add to mock data
            const newReport = {
                id: mockReports.length + 1,
                // slight random offset for location
                lat: defaultLat + (Math.random() - 0.5) * 0.005,
                lng: defaultLng + (Math.random() - 0.5) * 0.005,
                cat: cat,
                status: 'statWait',
                desc: desc,
                photo: currentPhotoBase64, // 업로드된 사진 저장
                date: new Date().toISOString().split('T')[0],
                reply: null
            };
            
            mockReports.push(newReport);
            renderReports();
            renderMapMarkers();
            hideSubmitScreen();
            
            // Scroll to top
            document.querySelector('main').scrollTop = 0;
        }

        function showDetailScreen(id) {
            const rep = mockReports.find(r => r.id === id);
            if(!rep) return;

            const content = document.getElementById('detail-content');
            
            const translatedDesc = getTranslatedText(rep.desc);
            const translatedReply = getTranslatedText(rep.reply);

            let replyHtml = '';
            if (rep.reply) {
                replyHtml = `
                <div class="mt-6">
                    <h4 class="font-bold text-sm text-gray-800 mb-3 flex items-center gap-2">
                        <i data-lucide="message-square" class="w-4 h-4 text-indigo-600"></i>
                        ${getText('official')}
                    </h4>
                    <div class="bg-indigo-50 border border-indigo-100 rounded-2xl p-4 text-sm text-indigo-900 leading-relaxed">
                        ${translatedReply}
                    </div>
                </div>`;
            } else {
                replyHtml = `
                <div class="mt-6 flex items-center justify-center p-6 bg-gray-100 rounded-2xl border border-dashed border-gray-300">
                    <p class="text-xs text-gray-400 text-center">Response is pending.<br>담당자 확인 중입니다.</p>
                </div>`;
            }

            content.innerHTML = `
                <div class="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 mb-4">
                    <div class="flex justify-between items-center mb-4 pb-4 border-b border-gray-50">
                        <div class="flex items-center gap-3">
                            <div class="p-2.5 bg-gray-50 rounded-xl text-gray-600">
                                <i data-lucide="${getCategoryIcon(rep.cat)}" class="w-6 h-6"></i>
                            </div>
                            <div>
                                <h2 class="font-bold text-gray-800">${getCategoryText(rep.cat)}</h2>
                                <p class="text-xs text-gray-400">${rep.date}</p>
                            </div>
                        </div>
                        ${getStatusBadge(rep.status)}
                    </div>
                    
                    <div class="py-2">
                        <p class="text-sm text-gray-700 leading-relaxed">${translatedDesc}</p>
                        ${rep.photo ? `<div class="mt-4 rounded-xl overflow-hidden border border-gray-200"><img src="${rep.photo}" class="w-full h-auto object-cover max-h-64"></div>` : ''}
                    </div>
                </div>
                ${replyHtml}
            `;

            lucide.createIcons();
            document.getElementById('screen-detail').classList.remove('hidden');
            document.getElementById('screen-detail').classList.add('flex');
        }

        function hideDetailScreen() {
            document.getElementById('screen-detail').classList.add('hidden');
            document.getElementById('screen-detail').classList.remove('flex');
        }

        // --- Rules Screen Logic ---
        function showRulesScreen() {
            renderRules();
            document.getElementById('screen-rules').classList.remove('hidden');
            document.getElementById('screen-rules').classList.add('flex');
        }

        function hideRulesScreen() {
            document.getElementById('screen-rules').classList.add('hidden');
            document.getElementById('screen-rules').classList.remove('flex');
        }

        function renderRules() {
            const content = document.getElementById('rules-content');
            
            const ruleItems = [
                { icon: 'trash-2', titleKey: 'rule1Title', descKey: 'rule1Desc', color: 'text-green-600', bg: 'bg-green-100' },
                { icon: 'volume-x', titleKey: 'rule2Title', descKey: 'rule2Desc', color: 'text-orange-600', bg: 'bg-orange-100' },
                { icon: 'car', titleKey: 'rule3Title', descKey: 'rule3Desc', color: 'text-blue-600', bg: 'bg-blue-100' }
            ];

            content.innerHTML = ruleItems.map(rule => `
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex items-start gap-4">
                    <div class="p-3 ${rule.bg} ${rule.color} rounded-xl shrink-0">
                        <i data-lucide="${rule.icon}" class="w-6 h-6"></i>
                    </div>
                    <div>
                        <h3 class="font-bold text-gray-800 text-base mb-1">${getText(rule.titleKey)}</h3>
                        <p class="text-sm text-gray-600 leading-relaxed">${getText(rule.descKey)}</p>
                    </div>
                </div>
            `).join('');
            
            lucide.createIcons();
        }

        // Initialize icons on first load
        lucide.createIcons();
    </script>
</body>
</html>
